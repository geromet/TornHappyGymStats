server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name torn.geromet.com;

    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    location /data/surfaces/ {
        alias /var/www/happygymstats/data/surfaces-cache/;
        access_log off;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:5047;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # Blazor — WebSocket upgrade required for SignalR (Interactive Server render mode)
    location / {
        proxy_pass         http://127.0.0.1:5182;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
    }
}

server {
    listen 80;
    server_name torn.geromet.com;
    return 301 https://$host$request_uri;
}
