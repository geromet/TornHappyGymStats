# AdminPanel dedicated host routing
# Ownership: admin.geromet.com only (no path-mount under torn/auth hosts)

server {
    listen 80;
    listen [::]:80;
    server_name admin.geromet.com;

    # Public health surface for external uptime checks.
    location = /admin/health {
        proxy_pass http://127.0.0.1:5048/admin/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else remains auth-gated by AdminPanel runtime.
    location / {
        proxy_pass http://127.0.0.1:5048;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
